name: Export models to ONNX

# Runs the PyTorch -> ONNX export on GitHub's servers (no local torch needed),
# uploads the .onnx files to the weights-v2 release, and commits the metadata.
on:
  workflow_dispatch:
  push:
    paths:
      - scripts/export_onnx.py
      - .github/workflows/export-onnx.yml

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (CPU torch + timm + onnx)
        run: |
          python -m pip install --upgrade pip
          # torch AND torchvision must come from the same CPU index as a matched
          # pair, otherwise timm's torchvision import fails (torchvision::nms).
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install timm onnx

      - name: Export to ONNX
        run: python scripts/export_onnx.py

      - name: Upload ONNX files to the weights-v2 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload weights-v2 onnx_upload/*.onnx --clobber

      - name: Commit ONNX metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/onnx_meta.json
          if git diff --staged --quiet; then
            echo "No metadata changes to commit."
          else
            git commit -m "Add ONNX export metadata [skip ci]"
            git push
          fi
